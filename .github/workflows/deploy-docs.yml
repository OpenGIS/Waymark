name: Deploy Docs to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Copy Waymark JS assets into docs
        run: |
          mkdir -p docs/assets/waymark-js
          cp -r waymark-js/dist/css    docs/assets/waymark-js/css
          cp -r waymark-js/dist/js     docs/assets/waymark-js/js
          cp -r waymark-js/dist/fonts  docs/assets/waymark-js/fonts
          cp -r waymark-js/dist/images docs/assets/waymark-js/images

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
